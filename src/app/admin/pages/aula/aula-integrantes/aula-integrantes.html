<div class="roster-container" style="padding: 20px;">
  
  <button class="btn-back" routerLink="/portal/aula">
    <i class="fas fa-arrow-left"></i> Volver al listado de aulas
  </button>

  <div class="header-section">
    <h2>Gestión de Integrantes</h2>
    <p class="subtitle">Aula: <span class="highlight">{{ codigo }}</span></p>
  </div>

  <section class="roster-section">
    <h3><i class="fas fa-chalkboard-teacher"></i> Profesores</h3>
    <div *ngFor="let prof of profesores" class="user-card">
      <div class="user-avatar-mini">{{ prof.nombre.substring(0,1) }}</div>
      <div class="user-details">
        <strong>{{ prof.nombre }} {{prof.apellido}}</strong>
        <span>{{ prof.email }}</span>
      </div>
      <span class="badge-prof">Docente</span>
    </div>
  </section>

  <section class="roster-section">
    <h3><i class="fas fa-user-graduate"></i> Estudiantes</h3>
    <table class="roster-table">
      <thead>
        <tr>
          <th>Nombre del Estudiante</th>
          <th>Correo Electrónico</th>
          <th>Estado Actual</th>
          <th>Cambiar Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let est of estudiantes">
          <td><strong>{{ est.nombres }}</strong></td>
          <td>{{ est.email }}</td>
          <td>
            <span class="status-pill" [ngClass]="est.estado">
              {{ est.estado | uppercase }}
            </span>
          </td>
          <td>
            <select 
              [(ngModel)]="est.estadoSeleccionado"
              (change)="cambiarEstado(est)"
              class="action-select">

              <option [ngValue]="0">Cambiar Estado</option>

              <option *ngFor="let estado of estados" [ngValue]="estado.id">
                {{ estado.nombre }}
              </option>

            </select>
          </td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
