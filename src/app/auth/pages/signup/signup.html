<div class="signup-container">
  <div class="signup-box">
    <div class="header">
      <h1>🎓 Registro de Alumno</h1>
      <p>Crea tu cuenta institucional en minutos</p>
    </div>

    <form #signupForm="ngForm" (ngSubmit)="registrar()" novalidate>
      <div class="form-grid">
        
        <div class="form-group">
          <label for="nombre">Nombres</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input 
              type="text" 
              id="nombre"
              name="nombre" 
              placeholder="Tu nombre"
              [(ngModel)]="registroData.nombre" 
              required
              minlength="2">
          </div>
        </div>

        <div class="form-group">
          <label for="apellidos">Apellidos</label>
          <div class="input-wrapper">
            <i class="fas fa-users"></i>
            <input 
              type="text" 
              id="apellidos"
              name="apellidos" 
              placeholder="Tus apellidos"
              [(ngModel)]="registroData.apellidos" 
              required
              minlength="2">
          </div>
        </div>

        <div class="form-group">
          <label for="usuario">Usuario</label>
          <div class="input-wrapper">
            <i class="fas fa-user-circle"></i>
            <input 
              type="text" 
              id="usuario"
              name="usuario" 
              placeholder="Tu usuario"
              [(ngModel)]="registroData.usuario" 
              required
              minlength="3">
          </div>
        </div>

        <div class="form-group">
          <label for="correo">Correo</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input 
              type="email" 
              id="correo"
              name="correo" 
              placeholder="tu@email.com"
              [(ngModel)]="registroData.correo" 
              required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input 
              type="password" 
              id="password"
              name="password" 
              placeholder="Mínimo 6 caracteres"
              [(ngModel)]="registroData.password" 
              required
              minlength="6">
          </div>
        </div>

        <div class="form-group">
          <label for="confirmar">Confirmación</label>
          <div class="input-wrapper">
            <i class="fas fa-shield-alt"></i>
            <input 
              type="password" 
              id="confirmar"
              name="confirmar" 
              placeholder="Repite tu contraseña"
              [(ngModel)]="registroData.confirmar" 
              required
              minlength="6">
          </div>
        </div>

      </div>

      <button type="submit" class="btn-signup" [disabled]="signupForm.invalid">
        ✓ Finalizar Registro
      </button>

      <div class="footer-links">
        ¿Ya tienes cuenta? <a (click)="irALogin()">Inicia sesión aquí</a>
      </div>
    </form>
  </div>
</div>
