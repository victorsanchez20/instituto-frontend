<div class="signup-container">

  <a class="back-btn" routerLink="/#">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="signup-wrapper">

    <div class="signup-branding">
      <div class="branding-content">
        <div class="branding-icon">🎓</div>
        <h1>Academia</h1>
        <p class="branding-subtitle">Sistema de Gestión Académica</p>
        <div class="features">
          <div class="feature-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Acceso a cursos en línea
          </div>
          <div class="feature-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Seguimiento de notas
          </div>
          <div class="feature-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Comunicación directa
          </div>
        </div>
      </div>
    </div>

    <div class="signup-form-section">
      <div class="form-header">
        <span class="form-eyebrow">Registro</span>
        <h2>Crear cuenta</h2>
        <p class="form-subtitle">Completa tus datos para registrarte en la plataforma.</p>
      </div>

      <form #signupForm="ngForm" (ngSubmit)="registrar()" novalidate class="signup-form">

        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombres</label>
            <div class="input-wrapper">
              <input type="text" id="nombre" name="nombre" placeholder="Ej: Carlos" [(ngModel)]="registroData.nombre" minlength="2" required>
              <div class="input-underline"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="apellidos">Apellidos</label>
            <div class="input-wrapper">
              <input type="text" id="apellidos" name="apellidos" placeholder="Ej: Mendoza" [(ngModel)]="registroData.apellidos" minlength="2" required>
              <div class="input-underline"></div>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="documento">Documento / DNI</label>
            <div class="input-wrapper">
              <input type="text" id="documento" name="documento" placeholder="Ej: 12345678" [(ngModel)]="registroData.documento">
              <div class="input-underline"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <div class="input-wrapper">
              <input type="tel" id="telefono" name="telefono" placeholder="Ej: 099123456" [(ngModel)]="registroData.telefono">
              <div class="input-underline"></div>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="usuario">Usuario</label>
            <div class="input-wrapper">
              <input type="text" id="usuario" name="usuario" placeholder="Ej: cmendoza" [(ngModel)]="registroData.usuario" minlength="3" required>
              <div class="input-underline"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="correo">Correo</label>
            <div class="input-wrapper">
              <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" [(ngModel)]="registroData.correo" required>
              <div class="input-underline"></div>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fechaNacimiento">Fecha de nacimiento</label>
            <div class="input-wrapper">
              <input type="date" id="fechaNacimiento" name="fechaNacimiento" [(ngModel)]="registroData.fechaNacimiento">
              <div class="input-underline"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="genero">Género</label>
            <div class="input-wrapper">
              <select id="genero" name="genero" [(ngModel)]="registroData.genero">
                <option value="">Seleccionar</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="Otro">Otro</option>
              </select>
              <div class="input-underline"></div>
            </div>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="direccion">Dirección</label>
          <div class="input-wrapper">
            <input type="text" id="direccion" name="direccion" placeholder="Ej: Calle Principal 123" [(ngModel)]="registroData.direccion">
            <div class="input-underline"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" [(ngModel)]="registroData.password" minlength="6" required>
              <div class="input-underline"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmar">Confirmar contraseña</label>
            <div class="input-wrapper">
              <input type="password" id="confirmar" name="confirmar" placeholder="Repite la contraseña" [(ngModel)]="registroData.confirmar" minlength="6" required>
              <div class="input-underline"></div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-signup" [disabled]="signupForm.invalid">
          <span>Crear cuenta</span>
          <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

        <div class="form-footer">
          ¿Ya tienes cuenta? <a (click)="irALogin()" class="login-link">Inicia sesión aquí</a>
        </div>
      </form>
    </div>

  </div>
</div>
