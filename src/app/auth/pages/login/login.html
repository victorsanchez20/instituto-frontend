<div class="login-container">
  <div class="login-wrapper">
    <!-- Sección izquierda con branding -->
    <div class="login-branding">
      <div class="branding-content">
        <div class="logo-icon">📚</div>
        <h1>Academia</h1>
        <p class="branding-subtitle">Sistema de Gestión Académica</p>
        <div class="features">
          <div class="feature-item">✓ Gestión completa de cursos</div>
          <div class="feature-item">✓ Seguimiento académico</div>
          <div class="feature-item">✓ Inscripciones en línea</div>
        </div>
      </div>
    </div>

    <!-- Sección derecha con formulario -->
    <div class="login-form-section">
      <div class="form-header">
        <h2>Bienvenido</h2>
        <p class="form-subtitle">Inicia sesión en tu cuenta</p>
      </div>

      <!-- Tabs modernas -->
      <div class="modern-tabs">
        <button 
          [class.active]="tipoUsuario === 'alumno'" 
          (click)="setTipo('alumno')"
          class="tab-btn">
          <span class="tab-icon">👨‍🎓</span>
          Estudiante
        </button>
        <button 
          [class.active]="tipoUsuario === 'admin'" 
          (click)="setTipo('admin')"
          class="tab-btn">
          <span class="tab-icon">👨‍💼</span>
          Admin / Prof
        </button>
      </div>

      <!-- Formulario moderno -->
      <form (ngSubmit)="validarUsuario()" class="modern-form">
        <div class="form-group">
          <label for="usuario">
            <span class="label-icon">👤</span>
            Usuario
          </label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="usuario" 
              placeholder="Ingrese su usuario" 
              [(ngModel)]="user" 
              name="user" 
              required>
            <div class="input-underline"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="password">
            <span class="label-icon">🔒</span>
            Contraseña
          </label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="password" 
              placeholder="Ingrese su contraseña" 
              [(ngModel)]="pass" 
              name="pass" 
              required>
            <div class="input-underline"></div>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <span>Ingresar</span>
          <span class="btn-arrow">→</span>
        </button>

        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </form>

      <!-- Footer de signup -->
      <div class="footer-signup" *ngIf="tipoUsuario === 'alumno'">
        <p>¿No tienes una cuenta? 
          <a [routerLink]="['/signup']" [queryParams]="{ role: tipoUsuario }" class="signup-link">
            Crea una aquí
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
